# Zookeeper connection string for the SolrCloud cluster hosting system_jobs_history.
# Defaults to "<release>-zookeeper-headless.<namespace>:2181" (same computed-default pattern
# as the collection-backups chart) if not set explicitly.
zookeeperHost:

# Fusion app name label applied to fusion_datasource_job_last_status series.
# Defaults to the release namespace (same pattern as collection-backups.customerId) if not set.
appName:

# solr.collection, solr.connect-timeout-secs, and poll.fixed-delay-ms are NOT exposed here -
# this chart's deployment.yaml only wires zk-host/namespace/app through to env vars
# (DATASOURCE_MONITOR_ZK_HOST/POD_NAMESPACE/FUSION_APP_NAME), with no extraEnv/passthrough
# mechanism for the others. Exposing chart values for them would be misleading until the
# chart itself adds that wiring.
#
# Deployment topology: this chart deploys one pod per Fusion namespace (not a central
# per-cluster poller) - a deliberate decision, not a default. See
# https://github.com/lucidworks-managed-fusion/cloud-engineering-tooling/pull/147 for the
# rationale (the exporter's Java runtime only supports one ZK host/namespace per process).

nodeSelector: {}
securityContext: {}
annotations: {}
labels: {}
imagePullSecrets: []

# Service Account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  # If not set and create is false, defaults to "default"
  name: ""
  annotations: {}

resources:
  # -Xmx2g/-Xms2g (the exporter's jib jvmFlags) + headroom for metaspace/threads/off-heap.
  requests:
    cpu: 250m
    memory: 2560Mi
  limits:
    cpu: 500m
    memory: 3Gi

image:
  repository: us-docker.pkg.dev/managed-fusion/engineering-tooling-images
  name: fusion-datasource-monitor
  tag: 0.1.0
  pullPolicy: Always

# Namespaced GMP Rules (PrometheusRule-equivalent) alerting over this exporter's metrics
# (SRCH-895). Off by default - the thresholds below are provisional defaults from
# Meychele's PRIN-1018 note, not yet product-confirmed per customer (see SRCH-902 for
# Amex's). Override per-customer in that customer's own values file rather than editing
# this chart, since different customers may confirm different thresholds.
#
# Single alert per namespace (FusionDatasourceJobCriticalIssue), not per datasource: fires only
# when at least one datasource meets the `client` (critical) thresholds below; the message body
# also lists any datasources that only meet the looser `ops` (non-critical) thresholds, so a
# single notification carries the full picture instead of one alert per failing datasource.
alerts:
  enabled: false
  # Optional per-environment links embedded in the alert message, to speed up triage. Both blank
  # by default - if unset, that line is simply omitted from the message rather than showing an
  # empty value. These vary per customer AND per environment (prod vs non-prod have different
  # hosts), so set them in that environment's own values file, not here.
  fusionUrl: "" # e.g. "https://amex.b.lucidworks.cloud" - this environment's Fusion UI/API host
  grafanaUrl: "" # e.g. "https://amex-internal-dashboard-prod.b.lucidworks.cloud" - Grafana host
  # kube context (gke_<project_id>_<location>_<cluster>) is NOT a value here - it's derived
  # automatically in templates/rules.yaml from labels GMP already attaches to every metric, so
  # there's nothing to configure per customer.
  # Non-critical tier - included in a firing alert's message, does not trigger one on its own.
  ops:
    failureCount: 2
    failureWindow: 48h
    # Same threshold as failureWindow, expressed in seconds - required because GMP/Prometheus
    # duration literals (e.g. "24h") are only valid inside a range vector selector ([24h]),
    # not in a scalar comparison like `time() - x > N`.
    staleWindowSeconds: 86400 # 24h
  # Critical tier - at least one datasource meeting these thresholds is what actually fires
  # and notifies (see templates/rules.yaml for why this alert's own `and` clauses need
  # `on (namespace, datasource)` - a bare `and` between different `status` label values never
  # matches in PromQL, a real bug in the original per-datasource design this replaced).
  client:
    failureCount: 4
    failureWindow: 8d
    staleWindowSeconds: 259200 # 72h
